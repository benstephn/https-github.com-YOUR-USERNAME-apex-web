<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Apex Web Development</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2315315e'/%3E%3Cpath d='M7 22 L16 10 L25 22' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  body{background:var(--bg)}
  /* login */
  .login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
  .login-card{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--line-strong);border-radius:20px;padding:2.4rem;box-shadow:var(--shadow)}
  .login-card .logo{justify-content:center;margin-bottom:.5rem;font-size:1.4rem}
  .login-card h1{font-family:var(--display);font-size:1.4rem;text-align:center;margin-bottom:.3rem}
  .login-card p{color:var(--muted);text-align:center;font-size:.92rem;margin-bottom:1.6rem}
  .login-card input{width:100%;background:var(--bg-2);border:1px solid var(--line-strong);border-radius:12px;padding:.9rem 1rem;color:var(--txt);font-family:var(--font);font-size:1rem;margin-bottom:1rem}
  .login-card input:focus{outline:none;border-color:var(--brand)}
  .login-err{color:#c0392b;font-size:.9rem;text-align:center;margin-top:.8rem;min-height:1.2rem}
  .hint{color:var(--muted-2);font-size:.8rem;text-align:center;margin-top:1.2rem}

  /* app shell */
  .admin{display:none;min-height:100vh;grid-template-columns:248px 1fr}
  .admin.show{display:grid}
  .side{background:var(--bg-2);border-right:1px solid var(--line);padding:1.4rem 1rem;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
  .side .logo{padding:.4rem .6rem 1.4rem;font-size:1.15rem}
  .side .nav-group{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted-2);padding:.9rem .8rem .4rem}
  .tab{display:flex;align-items:center;gap:.7rem;width:100%;background:none;border:none;color:var(--muted);font-family:var(--font);
    font-size:.94rem;font-weight:500;text-align:left;padding:.7rem .8rem;border-radius:10px;cursor:pointer;transition:all .15s;position:relative}
  .tab:hover{background:var(--bg-2);color:var(--ink)}
  .tab.active{background:var(--blue-soft);color:var(--brand);border:1px solid #d4e2fb}
  .tab .pill{margin-left:auto;background:#ff5a5a;color:#fff;font-size:.72rem;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:none;place-items:center;padding:0 6px}
  .tab .pill.show{display:grid}
  .side .spacer{flex:1}
  .main{padding:2rem 2.4rem;overflow-y:auto;height:100vh}
  .main-head{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.8rem;flex-wrap:wrap}
  .main-head h2{font-family:var(--display);font-size:1.6rem}
  .main-head p{color:var(--muted);font-size:.92rem;margin-top:.2rem}
  .save-bar{position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 30%);padding:1.4rem 0 .4rem;margin-top:1.5rem;display:flex;gap:1rem;align-items:center}
  .saved-flash{color:var(--accent);font-size:.9rem;opacity:0;transition:opacity .3s}
  .saved-flash.show{opacity:1}

  /* generic editor */
  .ed-field{margin-bottom:1.2rem}
  .ed-field label{display:block;font-size:.84rem;font-weight:600;color:var(--muted);margin-bottom:.4rem;text-transform:capitalize}
  .ed-field input[type=text],.ed-field input[type=email],.ed-field input[type=number],.ed-field textarea,.ed-field input:not([type]){
    width:100%;background:var(--bg-2);border:1px solid var(--line-strong);border-radius:10px;padding:.7rem .9rem;color:var(--txt);font-family:var(--font);font-size:.95rem}
  .ed-field textarea{resize:vertical;min-height:90px;line-height:1.5}
  .ed-field input:focus,.ed-field textarea:focus{outline:none;border-color:var(--brand)}
  .ed-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:1.4rem 1.5rem;margin-bottom:1rem;position:relative}
  .ed-card .row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .ed-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
  .ed-card-head .idx{font-family:var(--display);font-weight:700;color:var(--muted-2)}
  .icon-btn{background:rgba(255,90,90,.1);border:1px solid rgba(255,90,90,.3);color:#ff9a9a;border-radius:8px;padding:.4rem .8rem;font-size:.85rem;cursor:pointer;font-family:var(--font)}
  .icon-btn:hover{background:rgba(255,90,90,.18)}
  .add-btn{background:var(--blue-soft);border:1px dashed var(--line-strong);color:var(--brand);border-radius:12px;padding:.9rem;width:100%;cursor:pointer;font-family:var(--font);font-weight:600;font-size:.95rem}
  .add-btn:hover{border-color:var(--brand)}
  .switch{display:inline-flex;align-items:center;gap:.6rem;cursor:pointer;user-select:none}
  .switch input{display:none}
  .switch .track{width:44px;height:24px;border-radius:999px;background:var(--bg-2);border:1px solid var(--line-strong);position:relative;transition:background .2s}
  .switch .track::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--muted);transition:transform .2s,background .2s}
  .switch input:checked + .track{background:var(--brand)}
  .switch input:checked + .track::after{transform:translateX(20px);background:#fff}
  .img-edit{display:flex;gap:1rem;align-items:center}
  .img-edit .thumb{width:90px;height:64px;border-radius:8px;border:1px solid var(--line-strong);object-fit:cover;background:var(--bg-2)}
  .img-edit .thumb.empty{display:grid;place-items:center;color:var(--muted-2);font-size:.7rem;text-align:center}
  .color-edit{display:flex;align-items:center;gap:.7rem}
  .color-edit input[type=color]{width:46px;height:38px;border:1px solid var(--line-strong);border-radius:8px;background:var(--bg-2);cursor:pointer}

  /* inbox */
  .inbox{display:grid;grid-template-columns:300px 1fr;gap:1.2rem;height:calc(100vh - 160px)}
  .conv-list{border:1px solid var(--line);border-radius:14px;overflow-y:auto;background:var(--panel)}
  .conv{padding:1rem 1.1rem;border-bottom:1px solid var(--line);cursor:pointer;transition:background .15s}
  .conv:hover{background:var(--bg-2)}
  .conv.active{background:var(--blue-soft)}
  .conv .cn{display:flex;justify-content:space-between;align-items:center;gap:.5rem}
  .conv .cn strong{font-size:.95rem}
  .conv .cn .dot{width:9px;height:9px;border-radius:50%;background:#ff5a5a;flex-shrink:0}
  .conv .prev{color:var(--muted);font-size:.84rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.25rem}
  .conv .em{color:var(--muted-2);font-size:.76rem;margin-top:.2rem}
  .thread{border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;background:var(--panel);overflow:hidden}
  .thread-head{padding:1rem 1.3rem;border-bottom:1px solid var(--line);font-weight:600}
  .thread-head small{display:block;color:var(--muted-2);font-weight:400;font-size:.82rem}
  .thread-body{flex:1;overflow-y:auto;padding:1.3rem;display:flex;flex-direction:column;gap:.7rem;background:var(--bg-2)}
  .thread-empty{display:grid;place-items:center;height:100%;color:var(--muted);text-align:center;padding:2rem}
  .thread-foot{padding:.9rem;border-top:1px solid var(--line);display:flex;gap:.6rem}
  .thread-foot input{flex:1;background:var(--bg-2);border:1px solid var(--line-strong);border-radius:999px;padding:.75rem 1.1rem;color:var(--txt);font-family:var(--font);font-size:.95rem}
  .thread-foot input:focus{outline:none;border-color:var(--brand)}

  /* leads */
  .lead{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:1.3rem 1.5rem;margin-bottom:1rem}
  .lead.handled{opacity:.5}
  .lead .lh{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap}
  .lead .lh strong{font-size:1.05rem}
  .lead .meta{color:var(--muted);font-size:.88rem;margin:.5rem 0}
  .lead .meta a{color:var(--brand)}
  .lead .msg{color:var(--txt);background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:.8rem 1rem;margin-top:.6rem;font-size:.93rem}
  .lead .when{color:var(--muted-2);font-size:.8rem}
  .empty-state{text-align:center;color:var(--muted);padding:4rem 2rem}
  .empty-state .big{font-size:2.5rem;margin-bottom:.5rem}

  @media(max-width:820px){.admin.show{grid-template-columns:1fr}.side{position:fixed;z-index:60;width:248px;transform:translateX(-100%);transition:transform .2s}.side.open{transform:none}.inbox{grid-template-columns:1fr}.ed-card .row{grid-template-columns:1fr}}
</style>
</head>
<body>
<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <form class="login-card" id="loginForm">
    <div class="logo"><span class="mark"><svg viewBox="0 0 32 32" fill="none"><path d="M7 22 L16 10 L25 22" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>Apex Admin</span></div>
    <h1>Welcome back, Ben</h1>
    <p>Sign in to manage your website.</p>
    <input type="password" id="pw" placeholder="Password" autocomplete="current-password" autofocus>
    <button type="submit" class="btn btn-primary btn-block btn-lg">Sign in</button>
    <div class="login-err" id="loginErr"></div>
    <div class="hint">Tip: change the default password under Settings after your first login.</div>
  </form>
</div>

<!-- APP -->
<div class="admin" id="admin">
  <aside class="side" id="side">
    <div class="logo"><span class="mark"><svg viewBox="0 0 32 32" fill="none"><path d="M7 22 L16 10 L25 22" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>Apex Admin</span></div>
    <div class="nav-group">Messages</div>
    <button class="tab" data-tab="inbox">💬 Chat Inbox <span class="pill" id="pillInbox"></span></button>
    <button class="tab" data-tab="leads">📥 Quote Requests <span class="pill" id="pillLeads"></span></button>
    <div class="nav-group">Website content</div>
    <div id="contentTabs"></div>
    <div class="nav-group">Account</div>
    <button class="tab" data-tab="settings">⚙️ Settings</button>
    <div class="spacer"></div>
    <a href="/" target="_blank" class="tab">↗ View live site</a>
    <button class="tab" id="logoutBtn">⎋ Log out</button>
  </aside>
  <main class="main" id="main"></main>
</div>

<script src="/admin.js"></script>
</body>
</html>
