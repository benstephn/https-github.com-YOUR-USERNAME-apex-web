<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Received · Apex Web Development</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#ffffff">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2315315e'/%3E%3Cpath d='M7 22 L16 10 L25 22' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  .done-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
  .done-card{max-width:460px;text-align:center;background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:clamp(2rem,5vw,3rem)}
  .done-check{width:78px;height:78px;border-radius:50%;background:#e7f6ef;border:1px solid #bfe6d2;display:grid;place-items:center;margin:0 auto 1.4rem}
  .done-check svg{width:40px;height:40px;color:#1c9a63}
  .done-card h1{font-family:var(--display);font-size:1.8rem;color:var(--ink);margin-bottom:.6rem}
  .done-card p{color:var(--muted);margin-bottom:1.6rem;font-size:1rem}
</style>
</head>
<body>
<div class="bg-fx"></div>
<div class="done-wrap">
  <div class="done-card">
    <div class="done-check">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Payment received — thank you!</h1>
    <p>Your payment to <strong id="biz">Apex Web Development</strong> went through successfully. A receipt has been emailed to you by Stripe. I'll be in touch shortly!</p>
    <a href="/" class="btn btn-primary btn-lg">Back to website</a>
  </div>
</div>
<script>
  fetch("/api/content").then(function(r){return r.json();}).then(function(c){
    var b=(c.business||{});
    if(b.name)document.getElementById("biz").textContent=b.name;
    document.title="Payment Received · "+(b.name||"Apex Web Development");
  }).catch(function(){});
</script>
</body>
</html>
